name: Create Jira Custom Fields

on:
  workflow_dispatch:

jobs:
  create-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Create source_repo field
        run: |
          RESPONSE=$(curl -s -o /tmp/f1.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{
              "name": "source_repo",
              "description": "GitHub repository name (uutisseuranta.github.io / patterns / bq-activitystreams)",
              "type": "com.atlassian.jira.plugin.system.customfieldtypes:textfield",
              "searcherKey": "com.atlassian.jira.plugin.system.customfieldtypes:textsearcher"
            }' \
            "https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3/field")
          echo "source_repo: HTTP $RESPONSE"
          cat /tmp/f1.json

      - name: Create github_issue_number field
        run: |
          RESPONSE=$(curl -s -o /tmp/f2.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{
              "name": "github_issue_number",
              "description": "GitHub issue number (e.g. 42)",
              "type": "com.atlassian.jira.plugin.system.customfieldtypes:float",
              "searcherKey": "com.atlassian.jira.plugin.system.customfieldtypes:exactnumber"
            }' \
            "https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3/field")
          echo "github_issue_number: HTTP $RESPONSE"
          cat /tmp/f2.json

      - name: Create github_url field
        run: |
          RESPONSE=$(curl -s -o /tmp/f3.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{
              "name": "github_url",
              "description": "Direct link to GitHub issue",
              "type": "com.atlassian.jira.plugin.system.customfieldtypes:url",
              "searcherKey": "com.atlassian.jira.plugin.system.customfieldtypes:exacttextsearcher"
            }' \
            "https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3/field")
          echo "github_url: HTTP $RESPONSE"
          cat /tmp/f3.json

      - name: Add fields to project screen (US)
        run: |
          # Fetch field IDs from responses
          F1=$(cat /tmp/f1.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          F2=$(cat /tmp/f2.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          F3=$(cat /tmp/f3.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          echo "Field IDs: $F1 $F2 $F3"

          # Get screens for project US
          SCREENS=$(curl -s \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Accept: application/json" \
            "https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3/screens?queryString=US")
          echo "Screens: $SCREENS"

          SCREEN_ID=$(echo $SCREENS | python3 -c "import sys,json; d=json.load(sys.stdin); v=d.get('values',[]); print(v[0]['id'] if v else '')" 2>/dev/null)
          echo "Using screen ID: $SCREEN_ID"

          if [ -n "$SCREEN_ID" ] && [ -n "$F1" ]; then
            # Get default tab
            TABS=$(curl -s \
              -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
              -H "Accept: application/json" \
              "https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3/screens/${SCREEN_ID}/tabs")
            TAB_ID=$(echo $TABS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')" 2>/dev/null)
            echo "Tab ID: $TAB_ID"

            for FID in $F1 $F2 $F3; do
              if [ -n "$FID" ]; then
                curl -s -X POST \
                  -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
                  -H "Content-Type: application/json" \
                  -H "Accept: application/json" \
                  --data "{\"fieldId\": \"$FID\"}" \
                  "https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3/screens/${SCREEN_ID}/tabs/${TAB_ID}/fields"
                echo "Added $FID to screen"
              fi
            done
          fi

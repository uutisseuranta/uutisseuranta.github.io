name: Create Jira Custom Fields

on:
  workflow_dispatch:

jobs:
  create-fields:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

    steps:
      - name: Create source_repo field
        id: f1
        run: |
          AUTH=$(printf '%s:%s' "${JIRA_EMAIL}" "${JIRA_API_TOKEN}" | base64 -w 0)
          curl -s -o /tmp/f1.json -w "%{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{"name":"source_repo","description":"GitHub repository name","type":"com.atlassian.jira.plugin.system.customfieldtypes:textfield","searcherKey":"com.atlassian.jira.plugin.system.customfieldtypes:textsearcher"}' \
            "${BASE_URL}/field"
          cat /tmp/f1.json
          echo "id=$(python3 -c 'import json; print(json.load(open("/tmp/f1.json")).get("id",""))')" >> $GITHUB_OUTPUT

      - name: Create github_issue_number field
        id: f2
        run: |
          AUTH=$(printf '%s:%s' "${JIRA_EMAIL}" "${JIRA_API_TOKEN}" | base64 -w 0)
          curl -s -o /tmp/f2.json -w "%{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{"name":"github_issue_number","description":"GitHub issue number","type":"com.atlassian.jira.plugin.system.customfieldtypes:float","searcherKey":"com.atlassian.jira.plugin.system.customfieldtypes:exactnumber"}' \
            "${BASE_URL}/field"
          cat /tmp/f2.json
          echo "id=$(python3 -c 'import json; print(json.load(open("/tmp/f2.json")).get("id",""))')" >> $GITHUB_OUTPUT

      - name: Create github_url field
        id: f3
        run: |
          AUTH=$(printf '%s:%s' "${JIRA_EMAIL}" "${JIRA_API_TOKEN}" | base64 -w 0)
          curl -s -o /tmp/f3.json -w "%{http_code}\n" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{"name":"github_url","description":"Direct link to GitHub issue","type":"com.atlassian.jira.plugin.system.customfieldtypes:url","searcherKey":"com.atlassian.jira.plugin.system.customfieldtypes:exacttextsearcher"}' \
            "${BASE_URL}/field"
          cat /tmp/f3.json
          echo "id=$(python3 -c 'import json; print(json.load(open("/tmp/f3.json")).get("id",""))')" >> $GITHUB_OUTPUT

      - name: Add fields to project screen
        env:
          F1: ${{ steps.f1.outputs.id }}
          F2: ${{ steps.f2.outputs.id }}
          F3: ${{ steps.f3.outputs.id }}
        run: |
          AUTH=$(printf '%s:%s' "${JIRA_EMAIL}" "${JIRA_API_TOKEN}" | base64 -w 0)
          echo "Field IDs: F1=${F1} F2=${F2} F3=${F3}"

          SCREENS=$(curl -s \
            -H "Authorization: Basic ${AUTH}" \
            -H "Accept: application/json" \
            "${BASE_URL}/screens")

          cat > /tmp/get_screen.py << 'PYEOF'
          import sys, json
          d = json.load(sys.stdin)
          v = d.get('values', [])
          print(v[0]['id'] if v else '')
          PYEOF
          SCREEN_ID=$(echo "$SCREENS" | python3 /tmp/get_screen.py)
          echo "Screen ID: ${SCREEN_ID}"

          if [ -z "$SCREEN_ID" ]; then
            echo "No screen found, skipping"
            exit 0
          fi

          TABS=$(curl -s \
            -H "Authorization: Basic ${AUTH}" \
            -H "Accept: application/json" \
            "${BASE_URL}/screens/${SCREEN_ID}/tabs")

          cat > /tmp/get_tab.py << 'PYEOF'
          import sys, json
          d = json.load(sys.stdin)
          print(d[0]['id'] if isinstance(d, list) and d else '')
          PYEOF
          TAB_ID=$(echo "$TABS" | python3 /tmp/get_tab.py)
          echo "Tab ID: ${TAB_ID}"

          for FID in "${F1}" "${F2}" "${F3}"; do
            if [ -n "$FID" ] && [ -n "$TAB_ID" ]; then
              RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: Basic ${AUTH}" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                --data "{\"fieldId\":\"${FID}\"}" \
                "${BASE_URL}/screens/${SCREEN_ID}/tabs/${TAB_ID}/fields")
              echo "Added field ${FID}: HTTP ${RESP}"
            fi
          done

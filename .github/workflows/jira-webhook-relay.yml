name: Jira Webhook Relay

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled
      - unlabeled
      - assigned
      - unassigned
      - milestoned
      - demilestoned
  issue_comment:
    types:
      - created

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Jira Automation
        if: ${{ secrets.AUTOMATION_WEBHOOK_URL != '' || secrets.JIRA_WEBHOOK_URL != '' }}
        env:
          PAYLOAD: ${{ toJson(github.event) }}
          JIRA_WEBHOOK_TOKEN: ${{ secrets.JIRA_WEBHOOK_TOKEN }}
          JIRA_WEBHOOK_URL: ${{ secrets.AUTOMATION_WEBHOOK_URL || secrets.JIRA_WEBHOOK_URL }}
        run: |
          printf '%s' "$PAYLOAD" > payload.json
          curl --fail --retry 3 --retry-delay 5 \
            -X POST "$JIRA_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Automation-Webhook-Token: $JIRA_WEBHOOK_TOKEN" \
            --data-binary @payload.json

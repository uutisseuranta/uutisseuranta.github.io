name: Create Jira Custom Fields

on:
  workflow_dispatch:

env:
  BASE_URL: https://api.atlassian.com/ex/jira/38191fa4-e340-4d5e-8f7d-33c8f6829dbd/rest/api/3

jobs:
  create-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Build auth header
        id: auth
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          AUTH=$(echo -n "${JIRA_EMAIL}:${JIRA_API_TOKEN}" | base64 -w 0)
          echo "::add-mask::$AUTH"
          echo "auth=$AUTH" >> $GITHUB_OUTPUT

      - name: Create source_repo field
        id: f1
        env:
          AUTH: ${{ steps.auth.outputs.auth }}
        run: |
          HTTP=$(curl -s -o /tmp/f1.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{
              "name": "source_repo",
              "description": "GitHub repository name",
              "type": "com.atlassian.jira.plugin.system.customfieldtypes:textfield",
              "searcherKey": "com.atlassian.jira.plugin.system.customfieldtypes:textsearcher"
            }' \
            "${BASE_URL}/field")
          echo "source_repo HTTP: $HTTP"
          cat /tmp/f1.json
          F1=$(python3 -c "import json; d=json.load(open('/tmp/f1.json')); print(d.get('id',''))" 2>/dev/null)
          echo "id=$F1" >> $GITHUB_OUTPUT

      - name: Create github_issue_number field
        id: f2
        env:
          AUTH: ${{ steps.auth.outputs.auth }}
        run: |
          HTTP=$(curl -s -o /tmp/f2.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{
              "name": "github_issue_number",
              "description": "GitHub issue number (e.g. 42)",
              "type": "com.atlassian.jira.plugin.system.customfieldtypes:float",
              "searcherKey": "com.atlassian.jira.plugin.system.customfieldtypes:exactnumber"
            }' \
            "${BASE_URL}/field")
          echo "github_issue_number HTTP: $HTTP"
          cat /tmp/f2.json
          F2=$(python3 -c "import json; d=json.load(open('/tmp/f2.json')); print(d.get('id',''))" 2>/dev/null)
          echo "id=$F2" >> $GITHUB_OUTPUT

      - name: Create github_url field
        id: f3
        env:
          AUTH: ${{ steps.auth.outputs.auth }}
        run: |
          HTTP=$(curl -s -o /tmp/f3.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{
              "name": "github_url",
              "description": "Direct link to GitHub issue",
              "type": "com.atlassian.jira.plugin.system.customfieldtypes:url",
              "searcherKey": "com.atlassian.jira.plugin.system.customfieldtypes:exacttextsearcher"
            }' \
            "${BASE_URL}/field")
          echo "github_url HTTP: $HTTP"
          cat /tmp/f3.json
          F3=$(python3 -c "import json; d=json.load(open('/tmp/f3.json')); print(d.get('id',''))" 2>/dev/null)
          echo "id=$F3" >> $GITHUB_OUTPUT

      - name: Add fields to project US screen
        env:
          AUTH: ${{ steps.auth.outputs.auth }}
          F1: ${{ steps.f1.outputs.id }}
          F2: ${{ steps.f2.outputs.id }}
          F3: ${{ steps.f3.outputs.id }}
        run: |
          echo "Field IDs: F1=$F1 F2=$F2 F3=$F3"

          SCREENS=$(curl -s \
            -H "Authorization: Basic ${AUTH}" \
            -H "Accept: application/json" \
            "${BASE_URL}/screens?queryString=US")
          echo "Screens: $SCREENS"

          SCREEN_ID=$(echo "$SCREENS" | python3 -c "
import sys,json
d=json.load(sys.stdin)
v=d.get('values',[])
print(v[0]['id'] if v else '')
" 2>/dev/null)
          echo "Screen ID: $SCREEN_ID"

          if [ -z "$SCREEN_ID" ]; then
            echo "No screen found, skipping screen assignment"
            exit 0
          fi

          TABS=$(curl -s \
            -H "Authorization: Basic ${AUTH}" \
            -H "Accept: application/json" \
            "${BASE_URL}/screens/${SCREEN_ID}/tabs")
          TAB_ID=$(echo "$TABS" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print(d[0]['id'] if isinstance(d,list) and d else '')
" 2>/dev/null)
          echo "Tab ID: $TAB_ID"

          for FID in "$F1" "$F2" "$F3"; do
            if [ -n "$FID" ] && [ -n "$TAB_ID" ]; then
              RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: Basic ${AUTH}" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                --data "{\"fieldId\": \"${FID}\"}" \
                "${BASE_URL}/screens/${SCREEN_ID}/tabs/${TAB_ID}/fields")
              echo "Added field $FID to screen: HTTP $RESP"
            fi
          done
